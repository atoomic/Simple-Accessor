name: CI

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  perl-versions:
    runs-on: ubuntu-latest
    outputs:
      perl-versions: ${{ steps.perl-versions.outputs.perl-versions }}
    steps:
      - id: perl-versions
        uses: perl-actions/perl-versions@v2
        with:
          since-perl: 5.14
          with-devel: false

  linux:
    needs: perl-versions
    runs-on: ubuntu-latest
    name: "Linux / Perl ${{ matrix.perl-version }}"

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    strategy:
      fail-fast: false
      matrix:
        perl-version: ${{ fromJson(needs.perl-versions.outputs.perl-versions) }}

    container:
      image: perldocker/perl-tester:${{ matrix.perl-version }}

    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        run: cpm install -g --show-build-log-on-failure --cpanfile cpanfile
      - name: perl Makefile.PL
        run: perl Makefile.PL
      - name: make
        run: make
      - name: Run Tests
        run: make test

  macos:
    runs-on: macos-latest
    name: macOS

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    steps:
      - uses: actions/checkout@v6
      - name: Set up Perl
        run: brew install perl
      - name: perl -V
        run: perl -V
      - name: Install cpm
        run: |
          curl -fsSL --compressed https://raw.githubusercontent.com/skaji/cpm/main/cpm > cpm
          chmod +x cpm
          ./cpm --version
      - name: Install Dependencies
        run: ./cpm install -g --show-build-log-on-failure --cpanfile cpanfile
      - name: perl Makefile.PL
        run: perl Makefile.PL
      - name: make
        run: make
      - name: Run Tests
        run: make test
